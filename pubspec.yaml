name: gescom_app
description: A GesCom app with text-to-speech and speech-to-text functionality
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.0.0
  speech_to_text: ^7.3.0
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  http_parser: ^4.0.2
  
  # Add these here:
  camera: ^0.10.5+5
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/